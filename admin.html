<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin | Consegna24</title><link rel="icon" href="/favicon.png"><link rel="stylesheet" href="/css/style.css"></head><body><header class="topbar"><div class="shell"><a class="brand" href="/"><span class="logo">h24</span>Consegna24</a><nav class="nav"><a href="/profilo.html">Profilo</a><button class="btn primary" id="logoutBtn">Logout</button></nav></div></header><main class="page"><div class="shell"><div class="pageHead"><div><h1 class="pageTitle">Admin panel</h1><p class="muted">Gestione completa delle consegne.</p></div></div><div class="stats adminStats"><div class="stat"><span>Ordini validi</span><strong id="total">—</strong></div><div class="stat"><span>Attivi</span><strong id="active">—</strong></div><div class="stat"><span>Consegnati</span><strong id="delivered">—</strong></div><div class="stat featuredStat"><span>Valore ordini validi</span><strong id="revenue">—</strong></div></div><div class="adminToolbar"><input class="btn ghost" id="search" placeholder="Cerca cliente, telefono, indirizzo..."><select class="btn ghost" id="filter"><option value="">Tutti gli stati</option><option value="Il corriere non è ancora partito">Non ancora partito</option><option value="Il corriere ha visto l'ordine e sta arrivando">Corriere in arrivo</option><option value="in consegna">In consegna</option><option value="consegnato!">Consegnato</option><option value="annullato">Annullato</option></select></div><div id="orders" class="ordersGrid"></div></div></main><div class="modalLayer" id="editOrderModal"><div class="modal"><div class="modalHead"><div><h2>Modifica ordine</h2><p class="muted" id="editOrderId"></p></div><button class="x" type="button" data-close="editOrderModal">×</button></div><form class="modalBody" id="editOrderForm"><div class="grid2"><div class="field"><label>Indirizzo di partenza</label><input id="editPickup" required></div><div class="field"><label>Indirizzo di destinazione</label><input id="editDelivery" required></div><div class="field"><label>Nome mittente</label><input id="editSenderName"></div><div class="field"><label>Telefono mittente</label><input id="editSenderPhone" type="tel"></div><div class="field"><label>Nome destinatario</label><input id="editReceiverName"></div><div class="field"><label>Telefono destinatario</label><input id="editReceiverPhone" type="tel"></div><div class="field"><label>Fascia oraria</label><input id="editSlot"></div><div class="field"><label>Prezzo (€)</label><input id="editPrice" type="number" min="0" step="0.01" required></div><div class="field full"><label>Stato pagamento</label><select id="editPayment"><option value="pending">Non pagato</option><option value="checkout_created">Checkout creato</option><option value="paid">Pagato online</option><option value="cash_on_delivery">Pagamento al ritiro</option></select></div><div class="field full"><label>Oggetto e note</label><textarea id="editPackage"></textarea></div></div><button class="btn yellow fullBtn" id="saveOrderBtn" type="submit">Salva modifiche</button><p id="editOrderStatus"></p></form></div></div><div class="modalLayer" id="deliveredModal"><div class="modal small"><div class="modalHead"><div><h2>Conferma consegna</h2><p class="muted">Indica a chi è stato consegnato.</p></div><button class="x" data-close="deliveredModal">×</button></div><form class="modalBody" id="deliveredForm"><div class="field"><label>Consegnato a</label><textarea id="deliveredToInput" required></textarea></div><button class="btn yellow fullBtn">Conferma</button><p id="deliveredStatus"></p></form></div></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/js/config.js"></script><script src="/js/admin.js"></script></body></html>
